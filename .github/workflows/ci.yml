name: CI — test on push

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull processed data and model (DVC)
        run: |
          dvc remote add -d local_remote /tmp/dvc-remote || true
          dvc pull data/processed models/ || true

      - name: Syntax check
        run: |
          python -m py_compile src/preprocess.py src/train.py src/evaluate.py api/app.py

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v

      - name: Run full pipeline tests (if model exists)
        run: |
          if [ -f "models/model.pkl" ]; then
            pytest tests/test_pipeline.py -v
          else
            echo "Skipping pipeline tests — model not available in CI"
          fi
