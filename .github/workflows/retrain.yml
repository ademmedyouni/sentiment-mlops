name: CD — retrain on data or params change

on:
  push:
    branches: [main]
    paths:
      - "data/**/*.dvc"
      - "params.yaml"

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull data
        run: dvc pull data/

      - name: Run pipeline
        run: dvc repro

      - name: Commit updated metrics and lock
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add metrics.json evaluation.json dvc.lock || true
          git diff --staged --quiet || git commit -m "ci: retrain model [skip ci]"
          git push || true

      - name: Build Docker image
        run: docker build -t sentiment-api .
